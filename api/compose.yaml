services:
  postgres:
    image: 'postgres:17'
    environment:
      - 'POSTGRES_DB=ricash'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=ricash'
    ports:
      - '5432:5432'
  keycloak:
    image: 'quay.io/keycloak/keycloak:26.0.7'
    environment:
      - 'KEYCLOAK_ADMIN=admin'
      - 'KEYCLOAK_ADMIN_PASSWORD=admin'
      - 'KC_HOSTNAME=localhost'
    ports:
      - '9180:8080'
    entrypoint: [ "/opt/keycloak/bin/kc.sh", "start-dev" ]