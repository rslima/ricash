name: Backend CI

on:
  push:
    branches: [develop, main]
    paths:
      - 'api/**'
  pull_request:
    branches: [develop, main]
    paths:
      - 'api/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
          cache-dependency-path: 'api/pom.xml'

      - name: Run tests
        working-directory: api
        run: ./mvnw verify

      - name: Build
        working-directory: api
        run: ./mvnw clean package -DskipTests
