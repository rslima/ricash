name: Backend CI

on:
  push:
    branches: [develop, master]
    paths:
      - 'api/**'
  pull_request:
    branches: [develop, master]
    paths:
      - 'api/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
          cache-dependency-path: 'api/pom.xml'

      - name: Run tests
        working-directory: api
        run: ./mvnw verify

      - name: Build
        working-directory: api
        run: ./mvnw clean package -DskipTests

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
          cache-dependency-path: 'api/pom.xml'

      - name: Build Docker image
        working-directory: api
        run: ./mvnw spring-boot:build-image -DskipTests -Dspring-boot.build-image.imageName=registry.digitalocean.com/ricash/ricash-api:${{ github.sha }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 300

      - name: Tag and push image
        run: |
          docker tag registry.digitalocean.com/ricash/ricash-api:${{ github.sha }} registry.digitalocean.com/ricash/ricash-api:latest
          docker push registry.digitalocean.com/ricash/ricash-api:${{ github.sha }}
          docker push registry.digitalocean.com/ricash/ricash-api:latest

      - name: Trigger App Platform deployment
        run: doctl apps create-deployment ${{ secrets.DO_APP_ID }} --wait
